<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — CampusConnect</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="has-navbar">
    <header class="navbar">
      <a class="navbar__brand" href="index.html">CampusConnect</a>
      <nav aria-label="Main">
        <ul class="navbar__links">
          <li><a href="index.html" aria-current="page">Home</a></li>
          <li><a href="saved.html">Saved</a></li>
          <li><a href="login.html" id="navLogout">Logout</a></li>
        </ul>
      </nav>
    </header>

    <main class="dashboard container">
      <section class="dashboard-hero" aria-labelledby="userName">
        <div id="userAvatar" class="user-avatar" aria-hidden="true">KW</div>
        <div class="dashboard-hero__text">
          <h1 id="userName">Welcome back, Kwame!</h1>
          <p id="userInstitution">KNUST • Computer Science</p>
        </div>
      </section>

      <section class="filter-bar" aria-label="Filter events">
        <div class="filter-bar__scroll">
          <button type="button" class="filter-btn is-active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="workshop">Workshops</button>
          <button type="button" class="filter-btn" data-filter="internship">Internships</button>
          <button type="button" class="filter-btn" data-filter="scholarship">Scholarships</button>
          <button type="button" class="filter-btn" data-filter="competition">Competitions</button>
          <button type="button" class="filter-btn" data-filter="seminar">Seminars</button>
          <button type="button" class="filter-btn" data-filter="networking">Networking</button>
        </div>
      </section>

      <div id="loading" class="dashboard__loading">
        <div class="spinner" aria-hidden="true"></div>
        <span>Loading your matches…</span>
      </div>

      <div id="content" hidden>
        <div id="eventsGrid" class="events-grid"></div>
      </div>

      <div id="emptyState" class="empty-state" hidden>
        <div class="empty-state__icon" aria-hidden="true">📭</div>
        <h2 class="empty-state__title">No events found</h2>
        <p class="empty-state__hint">Try a different filter</p>
      </div>
    </main>

            <button type="button" class="btn btn-secondary btn-small" data-action="save">☆ Save</button>
          </div>
        </div>
      </article>
    -->

    <script src="js/insforge-runtime.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/matching.js"></script>
    <script src="js/events.js"></script>
  </body>
</html>
